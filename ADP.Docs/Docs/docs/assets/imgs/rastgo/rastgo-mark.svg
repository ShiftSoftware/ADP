<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
	<!-- Rastgo mark — yellow star symbol, transparent. For dark surfaces (e.g. the site header).
	     The hollow is a true cut-out (evenodd), so the symbol adapts to any background. -->
	<g transform="translate(38,38) scale(1.5)">
		<path fill-rule="evenodd" fill="#F2C230"
		      d="M60,0 75,45 120,60 75,75 60,120 45,75 0,60 45,45 Z
		         M60,28 68,52 92,60 68,68 60,92 52,68 28,60 52,52 Z"/>
	</g>
</svg>
